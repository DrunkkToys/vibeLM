name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Package release artifact
        run: |
          mkdir -p release
          zip -r "release/vibeLM-${GITHUB_REF_NAME}.zip" \
            manifest.json \
            config.json \
            package.json \
            package-lock.json \
            README.md \
            build.sh \
            src \
            dist \
            .lmstudio/entry.ts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/vibeLM-${{ github.ref_name }}.zip
          generate_release_notes: true
