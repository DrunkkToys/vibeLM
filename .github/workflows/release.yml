name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      LMSTUDIO_TOKEN: ${{ secrets.LMSTUDIO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Package release artifact
        run: |
          mkdir -p release
          zip -r "release/vibeLM-${GITHUB_REF_NAME}.zip" \
            manifest.json \
            config.json \
            package.json \
            package-lock.json \
            README.md \
            build.sh \
            src \
            dist \
            .lmstudio/entry.ts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/vibeLM-${{ github.ref_name }}.zip
          generate_release_notes: true

      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Publish to LM Studio Hub
        if: env.LMSTUDIO_TOKEN != ''
        run: |
          if ! command -v lms >/dev/null 2>&1; then
            echo "::warning::lms CLI not found on this runner; skipping LM Studio Hub publish. lms ships with the LM Studio desktop app (not npm), and non-interactive 'lms login' auth is undocumented — this needs a self-hosted runner with lms installed, and a verified token-based login flow, before it can run unattended."
            exit 0
          fi
          lms login --token "$LMSTUDIO_TOKEN"
          lms push
